<h2 mat-dialog-title>Observaciones</h2>
<mat-dialog-content>
    <app-grid [dataService]="dataService" [config]="gridConfig"></app-grid>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <div style="display: flex; width: 100%;">
    <div style="margin-right: auto">
    </div>
    <div style="margin-left: auto; display: flex; gap: 10px">
      <app-button
        [label]="'Cancelar'"
        [type]="'danger'"
        (onClick)="salir()"
      ></app-button>
    </div>
  </div>
</mat-dialog-actions>
