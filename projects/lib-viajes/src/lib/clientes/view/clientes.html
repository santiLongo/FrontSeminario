<app-core-view title="Clientes">
  <div body>
    <!--  -->
    <mat-button-toggle-group
      [hideSingleSelectionIndicator]="true"
      (change)="dataService.search()"
      [formControl]="dataService.estado"
      style="margin-bottom: 20px"
    >
      <mat-button-toggle [value]="1">Activos</mat-button-toggle>
      <mat-button-toggle [value]="2">Inactivos</mat-button-toggle>
      <mat-button-toggle [value]="3">Todos</mat-button-toggle>
    </mat-button-toggle-group>
    <app-grid [dataService]="dataService" [config]="gridConfig"></app-grid>
  </div>
</app-core-view>
<p style="color: gray; font-family: cursive">clientes</p>

<ng-template #estado let-row>
  @if (row?.fechaBaja != null) {
    <span class="badge bg-danger">Inactivo</span>
  } @else {
    <span class="badge bg-success">Activo</span>
  }
</ng-template>
