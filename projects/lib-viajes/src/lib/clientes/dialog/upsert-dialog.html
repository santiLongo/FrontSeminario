<h2 mat-dialog-title>{{idCliente ? 'Editar Cliente' : 'Nuevo Cliente'}}</h2>
<mat-dialog-content>
  <form [formGroup]="formulario">
    <div class="row">
      <div class="col-6">
        <app-form-field
            label="Razon Social"
            formControlName="razonSocial"
        ></app-form-field>
      </div>
      <div class="col-6">
        <app-cuit-mask
            formControlName="cuit"
            label="Cuit"
        >
        </app-cuit-mask>
      </div>
    </div>
    <div class="row">
      <div class="col-6">
        <app-form-field
            label="Direccion"
            formControlName="direccion"
        ></app-form-field>
      </div>
      <div class="col-6">
        <app-number-form-field
            label="Telefono"
            formControlName="telefono"
        ></app-number-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <app-form-field
            label="Mail"
            formControlName="email"
        ></app-form-field>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <div style="display: flex; width: 100%;">
    <div style="margin-right: auto">
    </div>
    <div style="margin-left: auto; display: flex; gap: 10px">
      <app-button
        [label]="'Cancelar'"
        [type]="'danger'"
        (onClick)="salir()"
      ></app-button>
      <app-button
        [label]="'Guardar'"
        [type]="'success'"
        (onClick)="guardar()"
      ></app-button>
    </div>
  </div>
</mat-dialog-actions>
