<app-core-view title="Pendientes de Confirmar">
  <div body>
    <app-grid [dataService]="dataService" [config]="gridConfig"></app-grid>
  </div>
</app-core-view>

<ng-template #tipoTpl let-row>
  @if (row?.tipo === 1) {
    <span class="badge bg-primary">Emitida</span>
  } @else {
    <span class="badge bg-secondary">Recibida</span>
  }
</ng-template>

<ng-template #estadoTpl let-row>
  @switch (row?.estado) {
    @case (1) { <span class="badge bg-warning text-dark">Pendiente</span> }
    @case (2) { <span class="badge bg-info">Pago Parcial</span> }
    @case (3) { <span class="badge bg-success">Cancelada</span> }
    @default  { <span class="badge bg-danger">Anulada</span> }
  }
</ng-template>
