<h2 mat-dialog-title>Confirmar Factura {{ tipoLabel }} #{{ data.numero }}</h2>
<mat-dialog-content>
  <p class="text-muted small mb-3">
    Podés confirmar la factura sin datos de AFIP, o cargar el CAE manualmente si fue enviada externamente.
  </p>
  <form [formGroup]="formulario">
    <div class="row mb-3">
      <div class="col-12">
        <app-form-field label="CAE (opcional)" formControlName="cae"></app-form-field>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-6">
        <app-date-form-field label="Vencimiento CAE (opcional)" formControlName="caeFchVto"></app-date-form-field>
      </div>
      <div class="col-6">
        <app-form-field label="Tipo Comprobante (opcional)" formControlName="tipoComprobante"></app-form-field>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <div style="display:flex;width:100%;gap:10px;justify-content:flex-end">
    <app-button label="Cancelar" type="danger" (onClick)="salir()"></app-button>
    <app-button label="Confirmar" type="success" (onClick)="confirmar()"></app-button>
  </div>
</mat-dialog-actions>
