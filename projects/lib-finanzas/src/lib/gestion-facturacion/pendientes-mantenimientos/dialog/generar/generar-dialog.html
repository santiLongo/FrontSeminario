<h2 mat-dialog-title>Generar Factura — {{ data.titulo }}</h2>
<mat-dialog-content>
  <p class="text-muted small mb-3">
    Ingresá los datos de la factura recibida del taller para registrarla en el sistema.
  </p>
  <form [formGroup]="formulario">
    <div class="row mb-3">
      <div class="col-4">
        <app-number-form-field label="Punto de Venta" formControlName="puntoVenta"></app-number-form-field>
      </div>
      <div class="col-4">
        <app-number-form-field label="Número" formControlName="numero"></app-number-form-field>
      </div>
      <div class="col-4">
        <app-date-form-field label="Fecha Vencimiento (opcional)" formControlName="fechaVencimiento"></app-date-form-field>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-6">
        <app-combo label="Moneda" [type]="'ComboMoneda'" formControlName="idMoneda"></app-combo>
      </div>
      <div class="col-6">
        <app-combo
          label="% IVA"
          [isLocal]="true"
          [data]="[{numero: 0, descripcion: '0%'}, {numero: 10.5, descripcion: '10.5%'}, {numero: 21, descripcion: '21%'}]"
          formControlName="porcentajeIva"
        ></app-combo>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-12">
        <app-form-field label="Observaciones (opcional)" formControlName="observaciones"></app-form-field>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <div style="display:flex;width:100%;gap:10px;justify-content:flex-end">
    <app-button label="Cancelar" type="danger" (onClick)="salir()"></app-button>
    <app-button label="Generar Factura" type="success" (onClick)="generar()"></app-button>
  </div>
</mat-dialog-actions>
